name: Release

# Push a version tag (e.g. v0.1.0) → build the signed Windows installers,
# publish them as a GitHub Release (live, no draft), then auto-submit the new
# version to winget. Fully hands-off; no manual publish step.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for signed auto-updates. Generate with `bun tauri signer generate`
          # and store both as repository secrets (Settings → Secrets → Actions).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "mdedit ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

  # Submit the freshly-published version to winget (microsoft/winget-pkgs). Runs
  # after the release is live so the .msi asset is publicly downloadable. Needs a
  # WINGET_TOKEN secret (classic PAT, public_repo scope) — see README. The very
  # first version must be submitted once manually; this keeps it updated after.
  winget:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: lexandro.mdedit
          installers-regex: '\.msi$'
          release-tag: ${{ github.ref_name }}
          token: ${{ secrets.WINGET_TOKEN }}

  # Chocolatey is published by .github/workflows/choco.yml, which runs
  # automatically after this Release completes (and can be triggered manually).
